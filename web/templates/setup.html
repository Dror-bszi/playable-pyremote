<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayAble — WiFi Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh; padding: 20px; color: #333;
        }
        .card {
            max-width: 420px; margin: 40px auto;
            background: white; border-radius: 16px;
            padding: 32px; box-shadow: 0 8px 32px rgba(0,0,0,.25);
        }
        h1 { color: #667eea; margin-bottom: 4px; font-size: 1.9rem; }
        .subtitle { color: #888; margin-bottom: 24px; font-size: .9rem; }
        label {
            display: block; font-weight: 600; color: #555;
            margin-bottom: 5px; font-size: .9rem;
        }
        select, input[type=password] {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; margin-bottom: 16px;
            background: white; appearance: auto;
        }
        select:focus, input:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,.15);
        }
        .btn {
            width: 100%; padding: 12px; background: #667eea;
            color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: background .15s;
        }
        .btn:hover  { background: #5568d3; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .msg {
            padding: 12px 14px; border-radius: 8px;
            margin: 12px 0; font-size: .9rem; font-weight: 500;
        }
        .msg.info    { background: #e3f2fd; color: #1565c0; }
        .msg.success { background: #e8f5e9; color: #2e7d32; }
        .msg.error   { background: #ffebee; color: #b71c1c; }
        .hidden { display: none; }
        .rescan-row { text-align: right; margin-bottom: 4px; }
        .link-btn {
            background: none; border: none; color: #667eea;
            cursor: pointer; font-size: .82rem; text-decoration: underline;
        }
        /* Back link */
        .back-link {
            display: inline-block; margin-bottom: 20px;
            color: #667eea; font-size: .88rem; text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        /* Success section */
        .success-card {
            background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 10px; padding: 20px; text-align: center; margin-top: 16px;
        }
        .success-card h2 { color: #15803d; font-size: 1.1rem; margin-bottom: 14px; }
        .qr-wrap img {
            width: 180px; height: 180px;
            padding: 6px; background: white;
            border-radius: 8px; border: 1px solid #e5e7eb;
            display: block; margin: 0 auto 12px;
        }
        .url-label {
            font-family: monospace; font-size: .85rem;
            color: #667eea; word-break: break-all;
        }
        .url-label a { color: inherit; text-decoration: none; }
        .url-label a:hover { text-decoration: underline; }
        .hint { font-size: .8rem; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
<div class="card">
    {% if network_mode == 'wifi' %}
    <a href="http://{{ hostname }}.local:5000" class="back-link">&#8592; Dashboard</a>
    {% endif %}

    <h1>PlayAble</h1>
    <p class="subtitle">Connect to your WiFi network</p>

    <div id="connect-section">
        <div class="rescan-row">
            <button class="link-btn" id="btn-rescan">&#8635; Rescan</button>
        </div>
        <label for="ssid-select">Select Network</label>
        <select id="ssid-select">
            <option value="">— scanning… —</option>
        </select>

        <label for="wifi-password">Password</label>
        <input type="password" id="wifi-password"
               placeholder="Leave blank for open networks" autocomplete="off">

        <button class="btn" id="btn-connect">Connect</button>
    </div>

    <div id="msg" class="msg hidden"></div>

    <div id="success-section" class="hidden">
        <div class="success-card">
            <h2>&#10003; Connected!</h2>
            <p style="font-size:.88rem;color:#555;margin-bottom:14px;">
                PlayAble dashboard is now available at:
            </p>
            <div class="qr-wrap">
                <img src="/static/qr.png" alt="QR code for PlayAble dashboard">
            </div>
            <p class="url-label">
                <a id="dashboard-url" href="#" target="_blank"></a>
            </p>
            <p class="hint">Scan from any device on the same WiFi network</p>
        </div>
    </div>
</div>

<script>
const HOSTNAME = '{{ hostname }}';
const DASH_URL = 'http://' + HOSTNAME + '.local:5000';

async function loadNetworks() {
    const sel = document.getElementById('ssid-select');
    sel.innerHTML = '<option value="">— scanning… —</option>';
    try {
        const r = await fetch('/api/network/scan');
        const d = await r.json();
        const nets = d.networks || [];
        sel.innerHTML = nets.length
            ? '<option value="">Select a network…</option>'
            : '<option value="">No networks found</option>';
        nets.forEach(n => {
            const opt = document.createElement('option');
            opt.value = n.ssid;
            const bar = n.signal ? ` (${n.signal}%)` : '';
            const lock = (n.security && n.security !== '--') ? ' 🔒' : '';
            opt.textContent = n.ssid + bar + lock;
            sel.appendChild(opt);
        });
    } catch (e) {
        sel.innerHTML = '<option value="">— scan failed —</option>';
    }
}

async function connect() {
    const ssid = document.getElementById('ssid-select').value.trim();
    const pwd  = document.getElementById('wifi-password').value;
    if (!ssid) { showMsg('Select a network first', 'error'); return; }

    const btn = document.getElementById('btn-connect');
    btn.disabled = true;
    btn.textContent = 'Connecting…';
    showMsg('Connecting — this may take up to 30 seconds…', 'info');

    try {
        const r = await fetch('/api/network/wifi', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ssid, password: pwd }),
        });
        const d = await r.json();
        if (d.success) {
            showSuccess();
        } else {
            showMsg('Failed: ' + (d.error || 'unknown error'), 'error');
            btn.disabled = false;
            btn.textContent = 'Connect';
        }
    } catch (e) {
        // Server went down (hotspot stopped) — connection is likely in progress.
        // Show success anyway; user will switch to the new WiFi.
        showSuccess();
    }
}

function showSuccess() {
    document.getElementById('connect-section').classList.add('hidden');
    document.getElementById('msg').classList.add('hidden');
    const link = document.getElementById('dashboard-url');
    link.textContent = DASH_URL;
    link.href = DASH_URL;
    document.getElementById('success-section').classList.remove('hidden');
}

function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.classList.remove('hidden');
}

document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-rescan').addEventListener('click', loadNetworks);

loadNetworks();
</script>
</body>
</html>
